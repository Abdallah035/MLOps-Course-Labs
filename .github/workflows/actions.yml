name: CI/CD - Churn API to AWS ECR + EC2

# Trigger on every push to main (and allow manual runs from the Actions tab)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: TEST (pre-build validation)
  # ---------------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest with coverage
        run: uv run pytest tests/ -v --cov=app --cov=main --cov-report=term-missing

  # ---------------------------------------------------------------------------
  # Stage 2 + 3: BUILD the Docker image and PUSH it to AWS ECR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push image to ECR
    runs-on: ubuntu-latest
    needs: test            # only runs if tests passed
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "image=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Stage 4: DEPLOY to EC2 over SSH
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy container on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ vars.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            AWS_REGION="${{ vars.AWS_REGION }}"
            ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
            REGISTRY="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
            REPOSITORY="${{ vars.ECR_REPOSITORY }}"
            IMAGE="$REGISTRY/$REPOSITORY:latest"
            CONTAINER_PORT="${{ vars.CONTAINER_PORT }}"

            # Authenticate Docker on the instance to pull from ECR
            aws ecr get-login-password --region "$AWS_REGION" \
              | sudo docker login --username AWS --password-stdin "$REGISTRY"

            # Pull the freshly pushed image
            sudo docker pull "$IMAGE"

            # Replace any running container
            sudo docker rm -f churn-api || true

            # Map host CONTAINER_PORT -> container's internal 8000
            sudo docker run -d --name churn-api --restart unless-stopped \
              -p "$CONTAINER_PORT":8000 "$IMAGE"

            # Clean up old images
            sudo docker image prune -f
